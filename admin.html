<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - Radical</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<nav>
    <a href="index.html" style="text-decoration: none;"><h2>Panel Administrador</h2></a>
    <div>
        <a href="index.html" style="background: #444; padding: 10px 15px; border-radius: 5px;">Cerrar Sesión</a>
    </div>
</nav>

<div class="container">
    <h1>Gestión del Sistema</h1>
    
    <section>
        <h2>Usuarios Registrados</h2>
        <div class="tabla-container">
            <table class="tabla">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Documento</th>
                        <th>Sexo</th>
                        <th>Nickname</th>
                        <th>Contraseña</th>
                        <th>Tipo</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Juan Pérez</td>
                        <td>10203040</td>
                        <td>M</td>
                        <td>admin_radical</td>
                        <td>****</td>
                        <td><span class="tag-admin">Administrador</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section>
        <h2>Inventario de Productos</h2>
        <div class="tabla-container">
            <table class="tabla">
                <thead>
                    <tr>
                        <th>Nombre del Producto</th>
                        <th>Valor Compra</th>
                        <th>Valor Venta</th>
                        <th>Cantidad</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Zapatillas Pro-Run</td>
                        <td>$80.000</td>
                        <td>$120.000</td>
                        <td>15</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</div>

</body>
</html>
